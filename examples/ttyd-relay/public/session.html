<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ttyd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000000; --fg: #d4a041; --fg-dim: #8a6a2a; --fg-muted: #4a3a1a;
      --border: #1a1400; --active: #ffcc33; --error: #cc4444; --ok: #55aa55;
      --bell: #ff6600;
    }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Mono', monospace; background: var(--bg); color: var(--fg);
      display: flex; flex-direction: column; overflow: hidden; font-size: 15px;
    }

    .main { flex: 1; display: flex; min-height: 0; }

    /* Left sidebar */
    .sidebar {
      width: 228px; border-right: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; background: #030300;
    }
    .sidebar-header {
      padding: 12px 16px; font-size: 11px; color: var(--fg-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header button {
      background: none; border: none; color: var(--fg-muted); font-size: 18px;
      cursor: pointer; font-family: inherit; padding: 0 4px; transition: color 0.2s;
    }
    .sidebar-header .header-actions {
      display: flex; align-items: center; gap: 6px;
    }
    .sidebar-header button:hover { color: var(--fg); }
    .tab-list { flex: 1; overflow-y: auto; }
    .tab-item {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 10px 16px; font-size: 13px; text-align: left; cursor: pointer;
      border: none; border-left: 2px solid transparent;
      color: var(--fg-muted); background: none; font-family: inherit;
      transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab-item.dragging { opacity: 0.45; }
    .tab-item.drop-before { box-shadow: inset 0 2px 0 var(--active); }
    .tab-item.drop-after { box-shadow: inset 0 -2px 0 var(--active); }
    .tab-item:hover { color: var(--fg-dim); background: rgba(212,160,65,0.03); }
    .tab-item.active {
      border-left-color: var(--active); color: var(--active); background: rgba(212,160,65,0.05);
    }
    .tab-item .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .tab-item .dot.on { background: var(--ok); }
    .tab-item .dot.off { background: var(--fg-muted); }
    .tab-item .tab-name { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .tab-item .tab-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tab-item .tab-pin {
      color: inherit; cursor: pointer;
      font: inherit; font-size: 11px; line-height: 1; opacity: 0.75;
    }
    .tab-item .tab-pin.active { color: var(--active); opacity: 1; }
    .tab-item .tab-pin:hover { opacity: 1; }

    @keyframes bell-pulse {
      0%, 100% { border-left-color: transparent; }
      25% { border-left-color: var(--bell); }
      75% { border-left-color: var(--bell); }
    }
    .tab-item.bell { animation: bell-pulse 0.5s ease 3; }

    .sidebar-footer {
      padding: 10px 16px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--fg-muted); line-height: 1.8;
    }
    .sidebar-footer kbd { color: var(--fg-dim); }

    /* Terminal area */
    .workspace { flex: 1; position: relative; min-height: 0; }
    .terminal-pane { position: absolute; inset: 0; display: none; flex-direction: column; }
    .terminal-pane.active { display: flex; }
    .terminal-pane .xterm-wrap { flex: 1; min-height: 0; }

    .waiting {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      padding: 28px;
    }
    .waiting .label {
      font-size: 12px; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase;
      text-align: center;
    }
    .waiting .cmd-box {
      display: flex; align-items: flex-start; gap: 10px; width: min(960px, 100%);
      font-size: 15px;
    }
    .waiting .prompt { color: var(--fg-dim); padding-top: 12px; }
    .waiting .cmd {
      background: #0a0a00; border: 1px solid var(--border); padding: 12px 16px;
      color: var(--fg); overflow-x: auto; white-space: pre; user-select: all;
      font: inherit; cursor: text; flex: 1; line-height: 1.6;
    }
    .waiting .copy-btn {
      color: var(--fg-muted); cursor: pointer; background: none; border: none;
      font: inherit; font-size: 14px; padding: 12px 0 0; transition: color 0.15s; flex-shrink: 0;
    }
    .waiting .copy-btn:hover { color: var(--fg); }
    .waiting .copy-btn.flash { color: var(--active); }
    .waiting .hint {
      font-size: 12px; color: var(--fg-muted); margin-top: 6px; text-align: center; line-height: 1.7;
    }

    .xterm { height: 100%; }

    .workspace::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.3) 100%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <span>tabs</span>
        <div class="header-actions">
          <button id="btn-session" title="New session (clears stored state)">N</button>
          <button id="btn-new" title="Ctrl+Shift+N">+</button>
        </div>
      </div>
      <div class="tab-list" id="tab-list"></div>
      <div class="sidebar-footer">
        <kbd>^⇧N</kbd> new &nbsp; <kbd>^⇧W</kbd> close<br>
        <kbd>^⇧[</kbd> <kbd>^⇧]</kbd> prev/next<br>
        drag reorder · dblclick rename · * pin
      </div>
    </div>

    <div class="workspace" id="workspace"></div>
  </div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css" />
  <script type="module">
    import { Terminal } from 'https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/+esm';
    import { FitAddon } from 'https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/+esm';

    const pathParts = location.pathname.split('/');
    const sessionId = pathParts[pathParts.indexOf('session') + 1] || 'unknown';
    const SESSION_KEY = 'ttyd-session-id';
    const SESSION_PREFIX = 'ttyd-ui:';
    const sharedKeyStorageKey = `${SESSION_PREFIX}key:${sessionId}`;
    const origin = location.origin;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = location.host;
    const textEncoder = new TextEncoder();
    const textDecoder = new TextDecoder();

    localStorage.setItem(SESSION_KEY, sessionId);

    document.title = `ttyd · ${sessionId.slice(0, 8)}`;

    const tabs = new Map();
    const storageKey = `ttyd-ui:${sessionId}`;
    const savedPrefs = loadTabPrefs();
    const sharedKey = loadOrCreateSharedKey();
    const sharedCryptoKeyPromise = importSharedCryptoKey(sharedKey);
    let tabOrder = Array.isArray(savedPrefs.order) ? savedPrefs.order : [];
    let activeTabId = null;
    let tabCounter = 0;
    let dragTabId = null;
    let viewerWs = null;
    let viewerSendQueue = Promise.resolve();

    const workspace = document.getElementById('workspace');
    const tabListEl = document.getElementById('tab-list');

    function getTabId() { return `t${++tabCounter}`; }

    function generateSessionId() {
      const bytes = crypto.getRandomValues(new Uint8Array(16));
      return bytesToBase64Url(bytes);
    }

    function loadOrCreateSharedKey() {
      const existing = localStorage.getItem(sharedKeyStorageKey);
      if (existing) return existing;
      const bytes = crypto.getRandomValues(new Uint8Array(32));
      const encoded = bytesToBase64Url(bytes);
      localStorage.setItem(sharedKeyStorageKey, encoded);
      return encoded;
    }

    function bytesToBase64(bytes) {
      let binary = '';
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function bytesToBase64Url(bytes) {
      return bytesToBase64(bytes).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function base64UrlToBytes(base64url) {
      const padded = base64url.replace(/-/g, '+').replace(/_/g, '/')
        + '='.repeat((4 - (base64url.length % 4 || 4)) % 4);
      return base64ToBytes(padded);
    }

    async function importSharedCryptoKey(base64url) {
      return crypto.subtle.importKey(
        'raw',
        base64UrlToBytes(base64url),
        { name: 'AES-GCM' },
        false,
        ['encrypt', 'decrypt'],
      );
    }

    async function encryptPayload(bytes) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await sharedCryptoKeyPromise;
      const cipher = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, bytes));
      const payload = new Uint8Array(iv.length + cipher.length);
      payload.set(iv, 0);
      payload.set(cipher, iv.length);
      return payload;
    }

    async function decryptPayload(bytes) {
      if (bytes.length < 12 + 16) throw new Error('encrypted payload too short');
      const iv = bytes.slice(0, 12);
      const cipher = bytes.slice(12);
      const key = await sharedCryptoKeyPromise;
      return new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher));
    }

    function queueViewerSend(task) {
      viewerSendQueue = viewerSendQueue.then(task).catch((err) => {
        console.error('viewer send failed', err);
      });
      return viewerSendQueue;
    }

    function clearStoredState() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i));
      for (const key of keys) {
        if (!key) continue;
        if (key === SESSION_KEY || key.startsWith(SESSION_PREFIX)) localStorage.removeItem(key);
      }
    }

    function getConnectUrl(tabId) {
      return `${proto}//${host}/session/${sessionId}/ws/terminal/${tabId}`;
    }

    function getConnectCmd() {
      return `curl -sN ${origin}/session/${sessionId}/urls | while read -r _url; do ttyd --connect-shared-key ${sharedKey} --connect "$_url" -W "\${SHELL:-bash}" & done`;
    }

    function loadTabPrefs() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || '{}');
      } catch {
        return {};
      }
    }

    function saveTabPrefs() {
      const labels = {};
      const pinned = {};
      for (const [tabId, e] of tabs) {
        if (e.customLabel) labels[tabId] = e.customLabel;
        if (e.pinned) pinned[tabId] = true;
      }
      localStorage.setItem(storageKey, JSON.stringify({
        order: tabOrder.filter((tabId) => tabs.has(tabId)),
        labels,
        pinned,
      }));
    }

    function ensureTabInOrder(tabId) {
      if (!tabOrder.includes(tabId)) tabOrder.push(tabId);
    }

    function getOrderedTabIds() {
      const ordered = tabOrder.filter((tabId) => tabs.has(tabId));
      for (const tabId of tabs.keys()) {
        if (!ordered.includes(tabId)) ordered.push(tabId);
      }
      const pinned = ordered.filter((tabId) => tabs.get(tabId)?.pinned);
      const regular = ordered.filter((tabId) => !tabs.get(tabId)?.pinned);
      return [...pinned, ...regular];
    }

    function renderTabList() {
      tabListEl.innerHTML = '';
      for (const tabId of getOrderedTabIds()) tabListEl.appendChild(tabs.get(tabId).tabBtn);
    }

    function updateTabLabel(tabId) {
      const e = tabs.get(tabId);
      if (!e) return;
      const hasExplicitTitle = e.title && e.title !== tabId;
      const label = e.customLabel
        || (hasExplicitTitle && e.cwdLabel && e.cwdLabel !== e.title ? `${e.title} · ${e.cwdLabel}` : null)
        || (hasExplicitTitle ? e.title : null)
        || e.cwdLabel
        || e.title;
      e.tabBtn.querySelector('.tab-name').textContent = label;
      const tooltip = [];
      if (e.customLabel) tooltip.push(e.customLabel);
      else if (hasExplicitTitle) tooltip.push(e.title);
      if (e.cwd) tooltip.push(e.cwd);
      e.tabBtn.title = tooltip.length > 0 ? tooltip.join('\n') : label;
      if (activeTabId === tabId) document.title = `ttyd · ${label}`;
    }

    function getCwdLabel(cwd) {
      if (!cwd || cwd === '/') return '/';
      const trimmed = cwd.replace(/\/+$/, '');
      const parts = trimmed.split('/');
      return parts[parts.length - 1] || '/';
    }

    function handleOsc7(tabId, uri) {
      const e = tabs.get(tabId);
      if (!e) return;
      let parsed;
      try {
        parsed = new URL(uri);
      } catch {
        return;
      }
      if (parsed.protocol !== 'file:') return;
      const cwd = decodeURIComponent(parsed.pathname || '/');
      e.cwd = cwd || '/';
      e.cwdLabel = getCwdLabel(e.cwd);
      updateTabLabel(tabId);
    }

    function parseOscSequences(tabId, bytes) {
      const e = tabs.get(tabId);
      if (!e) return;
      const text = e.oscDecoder.decode(bytes, { stream: true });
      let buffer = (e.oscBuffer || '') + text;
      const osc7 = /\x1b]7;([^\x07\x1b]+)(?:\x07|\x1b\\)/g;
      let match;
      while ((match = osc7.exec(buffer))) handleOsc7(tabId, match[1]);

      const lastOscStart = buffer.lastIndexOf('\x1b]7;');
      const hasTerminator = lastOscStart >= 0 && /(?:\x07|\x1b\\)/.test(buffer.slice(lastOscStart));
      if (lastOscStart >= 0 && !hasTerminator) buffer = buffer.slice(lastOscStart);
      else buffer = buffer.slice(-256);
      e.oscBuffer = buffer;
    }

    function enqueueTabReceive(tabId, handler) {
      const e = tabs.get(tabId);
      if (!e) return;
      e.recvQueue = e.recvQueue.then(handler).catch((err) => {
        console.error(`tab ${tabId} receive failed`, err);
      });
    }

    async function handleOutputPayload(tabId, base64) {
      const e = tabs.get(tabId);
      if (!e?.terminal) return;
      const bytes = await decryptPayload(base64ToBytes(base64));
      parseOscSequences(tabId, bytes);
      e.terminal.write(bytes);
    }

    async function handleTitlePayload(tabId, base64) {
      const bytes = await decryptPayload(base64ToBytes(base64));
      const title = textDecoder.decode(bytes);
      if (title) setTabTitle(tabId, title);
    }

    async function handlePrefsPayload(tabId, base64) {
      const bytes = await decryptPayload(base64ToBytes(base64));
      try {
        const prefs = JSON.parse(textDecoder.decode(bytes));
        const e = tabs.get(tabId);
        if (e) e.prefs = prefs;
      } catch {}
    }

    function moveTabRelative(tabId, targetId, placeAfter) {
      if (!tabId || !targetId || tabId === targetId) return;
      const order = tabOrder.filter((id) => id !== tabId && tabs.has(id));
      const targetIndex = order.indexOf(targetId);
      const insertAt = targetIndex < 0 ? order.length : targetIndex + (placeAfter ? 1 : 0);
      order.splice(insertAt, 0, tabId);
      tabOrder = order;
      renderTabList();
      saveTabPrefs();
    }

    function clearDropMarkers() {
      for (const { tabBtn } of tabs.values()) tabBtn.classList.remove('drop-before', 'drop-after');
    }

    function ensureTab(tabId, autoConnect) {
      if (tabs.has(tabId)) return;
      const pane = document.createElement('div');
      pane.className = 'terminal-pane';
      pane.dataset.tab = tabId;

      const waiting = document.createElement('div');
      waiting.className = 'waiting';
      waiting.innerHTML = `
        <div class="label">run this once in another terminal</div>
        <div class="cmd-box">
          <span class="prompt">$</span>
          <div class="cmd"></div>
          <button class="copy-btn">copy</button>
        </div>
        <div class="hint">leave it running; the first shell should start automatically, then use Ctrl+Shift+N for more</div>
      `;
      pane.appendChild(waiting);

      const xtermWrap = document.createElement('div');
      xtermWrap.className = 'xterm-wrap';
      xtermWrap.style.display = 'none';
      pane.appendChild(xtermWrap);

      workspace.appendChild(pane);

      const cmd = getConnectCmd();
      pane.dataset.wsUrl = getConnectUrl(tabId);
      pane.querySelector('.cmd').textContent = cmd;
      pane.querySelector('.copy-btn').addEventListener('click', function() {
        navigator.clipboard.writeText(cmd);
        this.textContent = '✓'; this.classList.add('flash');
        setTimeout(() => { this.textContent = 'copy'; this.classList.remove('flash'); }, 1500);
      });

      const tabBtn = document.createElement('button');
      tabBtn.className = 'tab-item';
      tabBtn.dataset.tab = tabId;
      tabBtn.draggable = true;
      tabBtn.innerHTML = `
        <span class="dot off"></span>
        <span class="tab-name"></span>
        <span class="tab-actions">
          <span class="tab-pin" title="Pin tab">*</span>
        </span>
      `;
      tabBtn.addEventListener('click', () => activateTab(tabId));
      tabBtn.addEventListener('dblclick', (ev) => {
        ev.preventDefault();
        const e = tabs.get(tabId);
        const nextLabel = prompt(`Label for ${tabId}`, e.customLabel || e.title);
        if (nextLabel === null) return;
        e.customLabel = nextLabel.trim() || null;
        updateTabLabel(tabId);
        saveTabPrefs();
      });
      tabBtn.addEventListener('dragstart', (ev) => {
        dragTabId = tabId;
        tabBtn.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', tabId);
      });
      tabBtn.addEventListener('dragend', () => {
        dragTabId = null;
        tabBtn.classList.remove('dragging');
        clearDropMarkers();
      });
      tabBtn.addEventListener('dragover', (ev) => {
        if (!dragTabId || dragTabId === tabId) return;
        ev.preventDefault();
        clearDropMarkers();
        const rect = tabBtn.getBoundingClientRect();
        const placeAfter = ev.clientY > rect.top + rect.height / 2;
        tabBtn.classList.add(placeAfter ? 'drop-after' : 'drop-before');
      });
      tabBtn.addEventListener('drop', (ev) => {
        if (!dragTabId || dragTabId === tabId) return;
        ev.preventDefault();
        const rect = tabBtn.getBoundingClientRect();
        const placeAfter = ev.clientY > rect.top + rect.height / 2;
        clearDropMarkers();
        moveTabRelative(dragTabId, tabId, placeAfter);
      });
      tabBtn.querySelector('.tab-pin').addEventListener('click', (ev) => {
        ev.stopPropagation();
        const e = tabs.get(tabId);
        e.pinned = !e.pinned;
        e.tabBtn.querySelector('.tab-pin').classList.toggle('active', e.pinned);
        renderTabList();
        saveTabPrefs();
      });

      const entry = {
        pane,
        xtermWrap,
        waiting,
        terminal: null,
        fitAddon: null,
        connected: false,
        requested: false,
        pinned: !!savedPrefs.pinned?.[tabId],
        cwd: null,
        cwdLabel: null,
        customLabel: savedPrefs.labels?.[tabId] || null,
        oscDecoder: new TextDecoder(),
        oscBuffer: '',
        prefs: null,
        recvQueue: Promise.resolve(),
        tabBtn,
        title: tabId,
      };
      tabs.set(tabId, entry);
      ensureTabInOrder(tabId);
      tabBtn.querySelector('.tab-pin').classList.toggle('active', entry.pinned);
      updateTabLabel(tabId);
      renderTabList();
      saveTabPrefs();

      if (autoConnect) setTabConnected(tabId, true);
      if (!activeTabId) activateTab(tabId);
    }

    function requestTabConnection(tabId) {
      const e = tabs.get(tabId);
      if (!e || e.connected || e.requested || viewerWs?.readyState !== WebSocket.OPEN) return;
      viewerWs.send(JSON.stringify({ type: 'new_tab', tab: tabId }));
      e.requested = true;
    }

    function requestPendingTabs() {
      for (const [tabId] of tabs) requestTabConnection(tabId);
    }

    function createTab() {
      const tabId = getTabId();
      ensureTab(tabId, false);
      activateTab(tabId);
      requestTabConnection(tabId);
      return tabId;
    }

    function removeTab(tabId) {
      const e = tabs.get(tabId);
      if (!e) return;
      if (e.terminal) e.terminal.dispose();
      e.pane.remove();
      e.tabBtn.remove();
      tabs.delete(tabId);
      tabOrder = tabOrder.filter((id) => id !== tabId);
      saveTabPrefs();
      if (activeTabId === tabId) {
        const r = getOrderedTabIds();
        r.length > 0 ? activateTab(r[r.length - 1]) : (activeTabId = null);
      }
    }

    function activateTab(tabId) {
      activeTabId = tabId;
      for (const [id, e] of tabs) {
        const on = id === tabId;
        e.pane.classList.toggle('active', on);
        e.tabBtn.classList.toggle('active', on);
        if (on) {
          e.tabBtn.classList.remove('bell');
          if (e.fitAddon && e.connected) { e.fitAddon.fit(); e.terminal.focus(); }
          document.title = `ttyd · ${e.tabBtn.querySelector('.tab-name').textContent || e.title}`;
        }
      }
    }

    function setTabTitle(tabId, title) {
      const e = tabs.get(tabId);
      if (!e) return;
      e.title = title;
      updateTabLabel(tabId);
    }

    function triggerBell(tabId) {
      const e = tabs.get(tabId);
      if (!e || activeTabId === tabId) return;
      e.tabBtn.classList.remove('bell');
      void e.tabBtn.offsetWidth;
      e.tabBtn.classList.add('bell');
    }

    function setTabConnected(tabId, connected) {
      const e = tabs.get(tabId);
      if (!e) return;
      e.connected = connected;
      e.tabBtn.querySelector('.dot').className = 'dot ' + (connected ? 'on' : 'off');

      if (connected && !e.terminal) {
        e.requested = true;
        e.waiting.style.display = 'none';
        e.xtermWrap.style.display = '';

        const terminal = new Terminal({
          cursorBlink: true, fontSize: 14, lineHeight: 1.15,
          fontFamily: "'IBM Plex Mono', monospace",
          theme: { background: '#000', foreground: '#d4a041', cursor: '#ffcc33', selectionBackground: '#3a2a00' },
        });
        const fitAddon = new FitAddon();
        terminal.loadAddon(fitAddon);
        terminal.open(e.xtermWrap);
        fitAddon.fit();

        const ro = new ResizeObserver(() => { if (e.pane.classList.contains('active')) fitAddon.fit(); });
        ro.observe(e.xtermWrap);

        terminal.onData(data => {
          void queueViewerSend(async () => {
            if (!viewerWs || viewerWs.readyState !== WebSocket.OPEN) return;
            const encrypted = await encryptPayload(textEncoder.encode(data));
            viewerWs.send(JSON.stringify({ type: 'input', tab: tabId, data: bytesToBase64(encrypted) }));
          });
        });

        terminal.onResize(({ cols, rows }) => {
          void queueViewerSend(async () => {
            if (viewerWs?.readyState !== WebSocket.OPEN) return;
            const payload = textEncoder.encode(JSON.stringify({ columns: cols, rows }));
            const encrypted = await encryptPayload(payload);
            viewerWs.send(JSON.stringify({ type: 'resize', tab: tabId, data: bytesToBase64(encrypted), cols, rows }));
          });
        });

        terminal.onTitleChange(title => { if (title) setTabTitle(tabId, title); });
        terminal.onBell(() => triggerBell(tabId));

        void queueViewerSend(async () => {
          if (viewerWs?.readyState !== WebSocket.OPEN) return;
          const payload = textEncoder.encode(JSON.stringify({ columns: terminal.cols, rows: terminal.rows }));
          const encrypted = await encryptPayload(payload);
          viewerWs.send(JSON.stringify({ type: 'resize', tab: tabId, data: bytesToBase64(encrypted), cols: terminal.cols, rows: terminal.rows }));
        });

        e.terminal = terminal;
        e.fitAddon = fitAddon;
        if (activeTabId === tabId) { fitAddon.fit(); terminal.focus(); }
        setTabTitle(tabId, tabId);
      }

      if (!connected && e.terminal) {
        e.terminal.dispose();
        e.terminal = null;
        e.fitAddon = null;
        e.xtermWrap.style.display = 'none';
        e.xtermWrap.innerHTML = '';
        e.waiting.style.display = '';
        e.waiting.querySelector('.hint').textContent = 'shell disconnected — keep the listener running and press Ctrl+Shift+N for a replacement';
        setTabTitle(tabId, tabId);
      }
    }

    // --- Single shared viewer WebSocket ---
    function connectViewer() {
      const url = `${proto}//${host}/session/${sessionId}/ws/viewer`;
      viewerWs = new WebSocket(url);

      viewerWs.addEventListener('open', () => {
        requestPendingTabs();
      });

      viewerWs.addEventListener('message', (ev) => {
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        switch (msg.type) {
          case 'tab_added':
            // Auto-create tab if we don't know about it
            ensureTab(msg.tab, true);
            setTabConnected(msg.tab, true);
            activateTab(msg.tab);
            break;
          case 'tab_removed':
            setTabConnected(msg.tab, false);
            break;
          case 'tab_list':
            for (const t of (msg.tabs || [])) {
              ensureTab(t, true);
              setTabConnected(t, true);
            }
            break;
          case 'output': {
            if (!msg.tab || !msg.data) break;
            enqueueTabReceive(msg.tab, () => handleOutputPayload(msg.tab, msg.data));
            break;
          }
          case 'title':
            if (msg.tab && msg.data) enqueueTabReceive(msg.tab, () => handleTitlePayload(msg.tab, msg.data));
            break;
          case 'prefs':
            if (msg.tab && msg.data) enqueueTabReceive(msg.tab, () => handlePrefsPayload(msg.tab, msg.data));
            break;
        }
      });

      viewerWs.addEventListener('close', () => {
        setTimeout(connectViewer, 2000);
      });
      viewerWs.addEventListener('error', () => viewerWs.close());
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (!e.ctrlKey || !e.shiftKey) return;
      switch (e.key) {
        case 'N': e.preventDefault(); createTab(); break;
        case 'W': e.preventDefault(); if (activeTabId) removeTab(activeTabId); break;
        case ']': e.preventDefault(); cycleTabs(1); break;
        case '[': e.preventDefault(); cycleTabs(-1); break;
      }
      const n = parseInt(e.key);
      if (n >= 1 && n <= 9) {
        e.preventDefault();
        const ids = getOrderedTabIds();
        if (n <= ids.length) activateTab(ids[n - 1]);
      }
    });

    function cycleTabs(dir) {
      const ids = getOrderedTabIds();
      if (ids.length < 2) return;
      const ci = ids.indexOf(activeTabId);
      activateTab(ids[(ci + dir + ids.length) % ids.length]);
    }

    document.getElementById('btn-new').addEventListener('click', () => createTab());
    document.getElementById('btn-session').addEventListener('click', () => {
      clearStoredState();
      location.href = `/session/${generateSessionId()}`;
    });

    // Start: create one empty tab and connect viewer
    createTab();
    connectViewer();
  </script>
</body>
</html>
