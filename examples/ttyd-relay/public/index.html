<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ttyd</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #d4a041;
      font: 15px/1.5 "IBM Plex Mono", monospace;
      display: grid;
      place-items: center;
    }
    .status { opacity: 0.8; letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="status">opening session...</div>
  <script>
    const SESSION_KEY = "ttyd-session-id";
    const SESSION_ID_RE = /^[A-Za-z0-9_-]{22}$/;

    function generateSessionId() {
      const bytes = crypto.getRandomValues(new Uint8Array(16));
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    const stored = localStorage.getItem(SESSION_KEY);
    const sessionId = stored && SESSION_ID_RE.test(stored) ? stored : generateSessionId();
    localStorage.setItem(SESSION_KEY, sessionId);
    location.replace(`/session/${sessionId}`);
  </script>
</body>
</html>
